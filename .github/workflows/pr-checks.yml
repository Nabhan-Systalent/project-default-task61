name: PR Checks

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Lint
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping lint"; exit 0; fi
          npm run lint --if-present

  unit-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Frontend unit tests
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping tests"; exit 0; fi
          npm run test:unit --if-present -- --coverage

  unit-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Backend unit tests
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping tests"; exit 0; fi
          npm run test:unit --if-present -- --coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Build
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping build"; exit 0; fi
          npm run build --if-present

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/owasp-top-ten

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository structure
        run: |
          test -f VERSION || { echo "::error::VERSION missing"; exit 1; }
          test -f CHANGELOG.md || { echo "::error::CHANGELOG.md missing"; exit 1; }
          for d in docs src database tests infra; do
            test -d "$d" || echo "::warning::expected directory '$d' not found"
          done
          echo "Structure OK — version $(cat VERSION)"

  check:
    if: always()
    needs: [lint, unit-test-frontend, unit-test-backend, build, security-scan, structure]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required checks
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
