name: PR Checks — 98fa6cbd-e212-4ab4-92cd-6d6f45a67b75

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

env:
  LINE_COVERAGE_THRESHOLD: 90
  BRANCH_COVERAGE_THRESHOLD: 85

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.filter.outputs.openapi }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            openapi:
              - 'docs/design/openapi.yaml'
            migrations:
              - 'database/migrations/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Dependency caching is intentionally NOT enabled here. actions/setup-node's
        # `cache:` input fails the step ("Dependencies lock file is not found") when no
        # package-lock.json / yarn.lock is committed — the normal state of a freshly
        # generated repo. The install steps already fall back to `npm install` when no
        # lockfile exists, so correctness does not depend on a cache.
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Lint
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping lint"; exit 0; fi
          npm run lint --if-present

  unit-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Run frontend unit tests with coverage
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping tests"; exit 0; fi
          npm run test:unit --if-present -- --coverage
      - name: Check coverage thresholds
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then echo "No coverage report — skipping threshold check"; exit 0; fi
          node -e "const s=require('./coverage/coverage-summary.json');const l=s.total.lines.pct,b=s.total.branches.pct,lt=parseInt(process.env.LINE_COVERAGE_THRESHOLD||'90',10),bt=parseInt(process.env.BRANCH_COVERAGE_THRESHOLD||'85',10);let f=false;if(l<lt){console.error('Line coverage '+l+'% below '+lt+'%');f=true;}if(b<bt){console.error('Branch coverage '+b+'% below '+bt+'%');f=true;}if(f)process.exit(1);"
      - name: Post frontend coverage comment
        if: ${{ always() }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: frontend-coverage
          message: |
            ## Frontend Coverage
            Line threshold: ${{ env.LINE_COVERAGE_THRESHOLD }}% | Branch threshold: ${{ env.BRANCH_COVERAGE_THRESHOLD }}%

  unit-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Dependency caching is intentionally NOT enabled here. actions/setup-node's
        # `cache:` input fails the step ("Dependencies lock file is not found") when no
        # package-lock.json / yarn.lock is committed — the normal state of a freshly
        # generated repo. The install steps already fall back to `npm install` when no
        # lockfile exists, so correctness does not depend on a cache.
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Run backend unit tests with coverage
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping tests"; exit 0; fi
          npm run test:unit --if-present -- --coverage
      - name: Check coverage thresholds
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then echo "No coverage report — skipping threshold check"; exit 0; fi
          node -e "const s=require('./coverage/coverage-summary.json');const l=s.total.lines.pct,b=s.total.branches.pct,lt=parseInt(process.env.LINE_COVERAGE_THRESHOLD||'90',10),bt=parseInt(process.env.BRANCH_COVERAGE_THRESHOLD||'85',10);let f=false;if(l<lt){console.error('Line coverage '+l+'% below '+lt+'%');f=true;}if(b<bt){console.error('Branch coverage '+b+'% below '+bt+'%');f=true;}if(f)process.exit(1);"
      - name: Post backend coverage comment
        if: ${{ always() }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage
          message: |
            ## Backend Coverage
            Line threshold: ${{ env.LINE_COVERAGE_THRESHOLD }}% | Branch threshold: ${{ env.BRANCH_COVERAGE_THRESHOLD }}%

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        # Dependency caching is intentionally NOT enabled here. actions/setup-node's
        # `cache:` input fails the step ("Dependencies lock file is not found") when no
        # package-lock.json / yarn.lock is committed — the normal state of a freshly
        # generated repo. The install steps already fall back to `npm install` when no
        # lockfile exists, so correctness does not depend on a cache.
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Build
        run: |
          if [ ! -f package.json ]; then echo "No package.json — skipping build"; exit 0; fi
          npm run build --if-present
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        if: ${{ hashFiles('Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # PR check only verifies the image builds (push: false), so a plain local
          # tag is correct. Prefixing with an unset registry secret produced an
          # invalid tag like "/name:sha" and failed the build.
          tags: 98fa6cbd-e212-4ab4-92cd-6d6f45a67b75:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo "No frontend — skipping accessibility audit"; exit 0; fi
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Build frontend
        run: |
          if [ ! -f package.json ]; then exit 0; fi
          npm run build --if-present
      - name: Detect build output directory
        id: builddir
        run: |
          if [ -d build ]; then echo "dir=build" >> $GITHUB_OUTPUT
          elif [ -d dist ]; then echo "dir=dist" >> $GITHUB_OUTPUT
          else echo "dir=none" >> $GITHUB_OUTPUT; fi
      - name: Start static server
        if: ${{ steps.builddir.outputs.dir != 'none' }}
        run: |
          npm install -g serve
          serve -s ${{ steps.builddir.outputs.dir }} -l 4173 &
          for i in $(seq 1 15); do curl -sf http://localhost:4173 && break || sleep 2; done
      - name: Run Lighthouse CI accessibility check
        if: ${{ steps.builddir.outputs.dir != 'none' }}
        run: |
          npm install -g @lhci/cli
          cat > /tmp/lighthouserc.json << 'EOF'
          {"ci":{"collect":{"url":["http://localhost:4173"],"numberOfRuns":1},"assert":{"assertions":{"categories:accessibility":["error",{"minScore":1}],"categories:performance":"off","categories:best-practices":"off","categories:seo":"off"}},"upload":{"target":"filesystem","outputDir":"/tmp/lhci-results"}}}
          EOF
          lhci autorun --config=/tmp/lighthouserc.json
      - name: Run axe accessibility audit
        if: ${{ steps.builddir.outputs.dir != 'none' }}
        run: |
          # Pin ChromeDriver to the Chrome that ships on the runner. Without this,
          # @axe-core/cli pulls the latest chromedriver, which refuses to drive an
          # older runner Chrome ("only supports Chrome version N") and fails the job
          # before any audit runs.
          DETECT_CHROMEDRIVER_VERSION=true npm install -g @axe-core/cli
          axe http://localhost:4173 --exit --tags wcag2a,wcag2aa

  spectral:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.openapi == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Lint OpenAPI spec with Spectral
        uses: stoplightio/spectral-action@0.5.0
        with:
          file_glob: 'docs/openapi/*.yaml'

  sqlfluff:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.migrations == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Lint SQL with SQLFluff
        run: |
          pip install "sqlfluff==3.1.0"
          sqlfluff lint --dialect postgres migrations/

  api-contract-tests:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.openapi == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Schemathesis
        run: pip install schemathesis
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies and start API server
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run start &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/health && break || sleep 2; done || true
      - name: Run Schemathesis contract tests
        run: |
          if [ ! -f docs/design/openapi.yaml ]; then echo "No OpenAPI spec — skipping"; exit 0; fi
          st run docs/design/openapi.yaml \
            --base-url http://localhost:8000 \
            --validate-schema=true \
            --checks all \
            --hypothesis-max-examples 25

  check:
    if: ${{ always() }}
    needs: [lint, unit-test-frontend, unit-test-backend, build, security-scan, accessibility]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required check did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
