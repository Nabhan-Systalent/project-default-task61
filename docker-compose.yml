services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USER:-app}
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped
  migrate:
    image: ${REGISTRY:-}project-default-task61:${IMAGE_TAG:-latest}
    command:
      - sh
      - '-c'
      - npm run migrate --if-present
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD:-changeme}@postgres:5432/appdb
    networks:
      - app-network
    restart: 'no'
    build:
      context: .
      dockerfile: Dockerfile
  backend:
    image: ${REGISTRY:-}project-default-task61:${IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: '3000'
  frontend:
    image: ${REGISTRY:-}project-default-task61-frontend:${IMAGE_TAG:-latest}
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:80/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
volumes:
  postgres-data: null
  redis-data: null
networks:
  app-network:
    driver: bridge
